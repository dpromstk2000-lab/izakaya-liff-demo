<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居酒屋DPRO 予約</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans JP', sans-serif;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .time-active {
            background: #0f172a !important;
            color: white !important;
            border-color: #0f172a !important;
            transform: scale(1.02);
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen pb-24">

    <header class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-start gap-3">
                <div>
                    <h1 class="text-xl font-black tracking-wider">🏮 居酒屋DPRO</h1>
                    <p class="text-[11px] text-slate-400 mt-1">LINE予約デモ / 昼・夜2部制対応</p>
                </div>

                <div class="text-right">
                    <div id="shop-status-badge" class="text-xs font-bold bg-slate-700 text-white px-3 py-1 rounded-full">
                        取得中...
                    </div>
                    <button onclick="refreshAll()" class="text-[10px] text-slate-400 underline mt-2">
                        更新
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-[100] px-4 py-3 rounded-xl shadow-lg text-sm font-bold bg-slate-900 text-white"></div>

    <main class="max-w-md mx-auto p-4 space-y-5">

        <!-- LINEプロフィール -->
        <section class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3">
                <img id="profile-picture" src="" alt="" class="hidden w-12 h-12 rounded-full border border-slate-200 object-cover">

                <div class="flex-1 min-w-0">
                    <p class="text-xs text-slate-400 font-bold">LINEユーザー</p>
                    <p id="profile-name" class="font-bold text-slate-800 truncate">認証中...</p>
                </div>

                <button onclick="loginLine()" id="btn-line-login" class="hidden bg-emerald-600 text-white text-xs font-bold px-3 py-2 rounded-xl active:scale-95 transition">
                    LINEログイン
                </button>
            </div>
        </section>

        <!-- 店舗ステータス -->
        <section class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-slate-400 font-bold">今の受付状況</p>
                    <p id="shop-status-text" class="text-lg font-black text-slate-800 mt-1">取得中...</p>
                </div>

                <div id="shop-status-icon" class="text-4xl">🏮</div>
            </div>

            <p id="shop-status-note" class="text-[11px] text-slate-400 mt-2">
                空席状況は店舗側で随時更新されます。
            </p>
        </section>

        <!-- 新規予約 -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="mb-4">
                <h2 class="text-lg font-black text-slate-800">新規予約</h2>
                <p class="text-[11px] text-slate-400 mt-1">
                    営業日・営業時間に合わせて予約可能な時間だけ表示されます。
                </p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">予約日</label>
                    <input
                        id="reserve-date"
                        type="date"
                        onchange="updateMainTimeSlots()"
                        class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500"
                    >
                    <p id="reserve-date-info" class="text-[11px] text-slate-400 mt-2"></p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2">予約時間</label>
                    <div id="time-slot-list" class="space-y-3">
                        <p class="text-xs text-slate-400">日付を選択してください。</p>
                    </div>
                    <input id="reserve-time" type="hidden">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">人数</label>
                        <select id="party-size" class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500">
                            <option value="1">1名</option>
                            <option value="2" selected>2名</option>
                            <option value="3">3名</option>
                            <option value="4">4名</option>
                            <option value="5">5名</option>
                            <option value="6">6名</option>
                            <option value="7">7名</option>
                            <option value="8">8名</option>
                            <option value="9">9名</option>
                            <option value="10">10名</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">席タイプ</label>
                        <select id="seat-type" class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500">
                            <option value="any">指定なし</option>
                            <option value="counter">カウンター</option>
                            <option value="table">テーブル</option>
                            <option value="private_room">個室</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2">好み・目的</label>

                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <label class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="pref-checkbox" value="静かめ">
                            静かめ
                        </label>

                        <label class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="pref-checkbox" value="にぎやか">
                            にぎやか
                        </label>

                        <label class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="pref-checkbox" value="飲み会">
                            飲み会
                        </label>

                        <label class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="pref-checkbox" value="食事中心">
                            食事中心
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ご要望</label>
                    <textarea id="customer-note" rows="3" class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500" placeholder="例：子ども連れです / 端の席希望 など"></textarea>
                </div>

                <button
                    id="btn-create-reservation"
                    onclick="createReservation()"
                    class="w-full bg-amber-600 hover:bg-amber-700 text-white font-black py-4 rounded-2xl active:scale-95 transition shadow-sm"
                >
                    予約リクエストを送る
                </button>

                <p class="text-[10px] text-slate-400 leading-relaxed">
                    ※送信後は店舗側で確認し、予約確定またはお断りの通知を行います。
                </p>
            </div>
        </section>

        <!-- 自分の予約 -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h2 class="text-lg font-black text-slate-800">自分の予約</h2>
                    <p class="text-[11px] text-slate-400 mt-1">仮予約・確定予約のみ表示されます。</p>
                </div>

                <button onclick="fetchMyReservations()" class="text-xs text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-full border border-blue-200">
                    🔄 更新
                </button>
            </div>

            <div id="my-reservation-list" class="space-y-3">
                <p class="text-center text-slate-400 text-sm py-6">読み込み中...</p>
            </div>
        </section>
    </main>

    <!-- 予約変更モーダル -->
    <div id="change-modal" class="hidden fixed inset-0 bg-black/50 z-[80] p-4">
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden mt-8 max-h-[90vh] overflow-y-auto">
            <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
                <div>
                    <h3 class="font-black">予約変更</h3>
                    <p class="text-[10px] text-slate-400 mt-1">現在の予約をキャンセルし、新しい仮予約を作成します。</p>
                </div>

                <button onclick="closeChangeModal()" class="w-9 h-9 rounded-full bg-white/10 font-bold">
                    ×
                </button>
            </div>

            <div class="p-5 space-y-4">
                <input id="change-old-reservation-id" type="hidden">
                <input id="change-reserve-time" type="hidden">

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">変更後の日付</label>
                    <input
                        id="change-reserve-date"
                        type="date"
                        onchange="updateChangeTimeSlots()"
                        class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500"
                    >
                    <p id="change-date-info" class="text-[11px] text-slate-400 mt-2"></p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2">変更後の時間</label>
                    <div id="change-time-slot-list" class="space-y-3">
                        <p class="text-xs text-slate-400">日付を選択してください。</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">人数</label>
                        <select id="change-party-size" class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500">
                            <option value="1">1名</option>
                            <option value="2">2名</option>
                            <option value="3">3名</option>
                            <option value="4">4名</option>
                            <option value="5">5名</option>
                            <option value="6">6名</option>
                            <option value="7">7名</option>
                            <option value="8">8名</option>
                            <option value="9">9名</option>
                            <option value="10">10名</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">席タイプ</label>
                        <select id="change-seat-type" class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500">
                            <option value="any">指定なし</option>
                            <option value="counter">カウンター</option>
                            <option value="table">テーブル</option>
                            <option value="private_room">個室</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">変更理由・メモ</label>
                    <textarea id="change-reason" rows="3" class="w-full border border-slate-300 rounded-xl p-3 text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500" placeholder="例：時間変更希望"></textarea>
                </div>

                <button onclick="submitChangeReservation()" id="btn-submit-change" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-4 rounded-2xl active:scale-95 transition">
                    この内容で予約変更する
                </button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2010334558-3WGZGeu2";
        const API_BASE = "";

        const STATUS_LABELS = {
            pending: "仮予約",
            confirmed: "確定",
            cancelled_customer: "顧客キャンセル",
            cancelled_shop: "店舗キャンセル",
            completed: "来店済み",
            no_show: "無断キャンセル"
        };

        const SEAT_LABELS = {
            any: "指定なし",
            counter: "カウンター",
            table: "テーブル",
            private_room: "個室"
        };

        const SHOP_STATUS_LABELS = {
            open: "空席あり",
            few: "残りわずか",
            full: "満席",
            closed: "受付停止"
        };

        const SHOP_STATUS_ICONS = {
            open: "⭕",
            few: "🔺",
            full: "❌",
            closed: "🛑"
        };

        const WEEKDAY_LABELS = ["日", "月", "火", "水", "木", "金", "土"];

        let lineProfile = null;
        let lineIdToken = null;
        let publicSettings = null;
        let selectedTime = "";
        let selectedChangeTime = "";
        let myReservations = [];

        window.addEventListener("DOMContentLoaded", async () => {
            setupInitialDates();

            await Promise.allSettled([
                fetchPublicStatus(),
                fetchPublicSettings()
            ]);

            await initLiff();

            updateMainTimeSlots();
            await fetchMyReservations();
        });

        function setupInitialDates() {
            const today = getTodayDateString();

            const reserveDate = document.getElementById("reserve-date");
            const changeDate = document.getElementById("change-reserve-date");

            reserveDate.value = today;
            reserveDate.min = today;

            changeDate.value = today;
            changeDate.min = today;
        }

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    document.getElementById("profile-name").innerText = "LINEログインが必要です";
                    document.getElementById("btn-line-login").classList.remove("hidden");
                    return;
                }

                lineProfile = await liff.getProfile();
                lineIdToken = liff.getIDToken();

                renderProfile();

            } catch (err) {
                console.error("LIFF初期化エラー:", err);
                document.getElementById("profile-name").innerText = "LINE認証エラー";
                document.getElementById("btn-line-login").classList.remove("hidden");
            }
        }

        function loginLine() {
            try {
                liff.login();
            } catch {
                alert("LINEログインを開始できませんでした。LIFF URLから開いてください。");
            }
        }

        function renderProfile() {
            document.getElementById("profile-name").innerText = lineProfile?.displayName || "LINEユーザー";

            const picture = document.getElementById("profile-picture");

            if (lineProfile?.pictureUrl) {
                picture.src = lineProfile.pictureUrl;
                picture.classList.remove("hidden");
            }
        }

        function ensureLineReady() {
            if (!lineIdToken) {
                throw new Error("LINEログインが必要です。");
            }

            return lineIdToken;
        }

        async function apiFetch(path, options = {}) {
            const res = await fetch(`${API_BASE}${path}`, {
                ...options,
                headers: {
                    ...(options.headers || {})
                }
            });

            const data = await res.json().catch(() => null);

            if (!res.ok || !data || data.ok === false) {
                throw new Error(data?.error || `APIエラー: ${res.status}`);
            }

            return data;
        }

        async function fetchPublicStatus() {
            try {
                const data = await apiFetch("/api/public/status", {
                    method: "GET"
                });

                const status = data.status?.status || "open";
                const message = data.status?.message || SHOP_STATUS_LABELS[status] || status;

                document.getElementById("shop-status-text").innerText = message;
                document.getElementById("shop-status-icon").innerText = SHOP_STATUS_ICONS[status] || "🏮";
                document.getElementById("shop-status-badge").innerText = message;

                const badge = document.getElementById("shop-status-badge");
                badge.className = "text-xs font-bold px-3 py-1 rounded-full";

                if (status === "open") badge.classList.add("bg-emerald-600", "text-white");
                else if (status === "few") badge.classList.add("bg-amber-500", "text-white");
                else if (status === "full") badge.classList.add("bg-red-600", "text-white");
                else badge.classList.add("bg-slate-600", "text-white");

            } catch (err) {
                console.error("店舗ステータス取得エラー:", err);
                document.getElementById("shop-status-text").innerText = "取得できませんでした";
                document.getElementById("shop-status-badge").innerText = "取得失敗";
            }
        }

        async function fetchPublicSettings() {
            try {
                const data = await apiFetch("/api/public/settings", {
                    method: "GET"
                });

                publicSettings = data;

                const months = Number(data.shop?.booking_window_months || 3);
                const maxDate = addMonthsToDateString(getTodayDateString(), months);

                document.getElementById("reserve-date").max = maxDate;
                document.getElementById("change-reserve-date").max = maxDate;

            } catch (err) {
                console.error("公開設定取得エラー:", err);
                showToast("営業設定を取得できませんでした。");
            }
        }

        async function refreshAll() {
            await Promise.allSettled([
                fetchPublicStatus(),
                fetchPublicSettings()
            ]);

            updateMainTimeSlots();
            updateChangeTimeSlots();
            await fetchMyReservations();

            showToast("最新情報に更新しました。");
        }

        function getTodayDateString() {
            return formatDate(new Date());
        }

        function formatDate(date) {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, "0");
            const dd = String(date.getDate()).padStart(2, "0");
            return `${yyyy}-${mm}-${dd}`;
        }

        function addMonthsToDateString(dateString, months) {
            const date = new Date(`${dateString}T00:00:00`);
            date.setMonth(date.getMonth() + months);
            return formatDate(date);
        }

        function formatTime(value) {
            if (!value) return "";
            return String(value).slice(0, 5);
        }

        function parseTimeToMinutes(value) {
            const [hh, mm] = formatTime(value).split(":").map(Number);
            return hh * 60 + mm;
        }

        function minutesToTime(minutes) {
            const hh = Math.floor(minutes / 60);
            const mm = minutes % 60;
            return `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
        }

        function getDowFromDateString(dateString) {
            return new Date(`${dateString}T00:00:00`).getDay();
        }

        function getSpecialDay(dateString) {
            return (publicSettings?.specialDays || []).find(day => day.target_date === dateString) || null;
        }

        function getEnabledBusinessShifts(dateString) {
            const dow = getDowFromDateString(dateString);

            const shifts = (publicSettings?.businessShifts || [])
                .filter(shift => Number(shift.dow) === dow && shift.is_enabled)
                .sort((a, b) => Number(a.sort_order || 100) - Number(b.sort_order || 100));

            if (shifts.length) {
                return shifts.map(shift => ({
                    shiftCode: shift.shift_code,
                    shiftLabel: shift.shift_label || shift.shift_code,
                    openTime: shift.open_time,
                    closeTime: shift.close_time,
                    lastOrderTime: shift.last_order_time || shift.close_time,
                    slotIntervalMinutes: Number(shift.slot_interval_minutes || 30),
                    maxGuestsPerSlot: shift.max_guests_per_slot,
                    maxGroupsPerSlot: shift.max_groups_per_slot,
                    note: shift.note || ""
                }));
            }

            return [];
        }

        function getFallbackBusinessHour(dateString) {
            const dow = getDowFromDateString(dateString);
            return (publicSettings?.businessHours || []).find(row => Number(row.dow) === dow) || null;
        }

        function getAvailability(dateString) {
            if (!publicSettings) {
                return {
                    available: false,
                    reason: "営業設定を取得中です。",
                    shifts: []
                };
            }

            const special = getSpecialDay(dateString);

            if (special) {
                if (special.is_closed) {
                    return {
                        available: false,
                        reason: special.note ? `臨時休業：${special.note}` : "臨時休業日です。",
                        shifts: []
                    };
                }

                return {
                    available: true,
                    reason: special.note ? `特別営業：${special.note}` : "特別営業日です。",
                    shifts: [
                        {
                            shiftCode: "special",
                            shiftLabel: "特別営業",
                            openTime: special.open_time,
                            closeTime: special.close_time,
                            lastOrderTime: special.last_order_time || special.close_time,
                            slotIntervalMinutes: Number(special.slot_interval_minutes || 30),
                            maxGuestsPerSlot: special.max_guests_per_slot,
                            maxGroupsPerSlot: special.max_groups_per_slot,
                            note: special.note || ""
                        }
                    ]
                };
            }

            const shifts = getEnabledBusinessShifts(dateString);

            if (shifts.length) {
                return {
                    available: true,
                    reason: "通常営業日です。",
                    shifts
                };
            }

            const fallback = getFallbackBusinessHour(dateString);

            if (!fallback || fallback.is_closed) {
                return {
                    available: false,
                    reason: fallback?.note ? `定休日：${fallback.note}` : "定休日です。",
                    shifts: []
                };
            }

            return {
                available: true,
                reason: fallback.note || "通常営業日です。",
                shifts: [
                    {
                        shiftCode: "regular",
                        shiftLabel: "通常営業",
                        openTime: fallback.open_time,
                        closeTime: fallback.close_time,
                        lastOrderTime: fallback.last_order_time || fallback.close_time,
                        slotIntervalMinutes: Number(fallback.slot_interval_minutes || 30),
                        maxGuestsPerSlot: fallback.max_guests_per_slot,
                        maxGroupsPerSlot: fallback.max_groups_per_slot,
                        note: fallback.note || ""
                    }
                ]
            };
        }

        function buildSlotsForShift(dateString, shift) {
            if (!shift.openTime || !shift.lastOrderTime) {
                return [];
            }

            const open = parseTimeToMinutes(shift.openTime);
            const last = parseTimeToMinutes(shift.lastOrderTime);
            const interval = Number(shift.slotIntervalMinutes || 30);

            const slots = [];

            const today = getTodayDateString();
            const now = new Date();
            const nowMinutes = now.getHours() * 60 + now.getMinutes();

            for (let minutes = open; minutes <= last; minutes += interval) {
                if (dateString === today && minutes <= nowMinutes) {
                    continue;
                }

                slots.push({
                    time: minutesToTime(minutes),
                    shiftCode: shift.shiftCode,
                    shiftLabel: shift.shiftLabel,
                    maxGuestsPerSlot: shift.maxGuestsPerSlot,
                    maxGroupsPerSlot: shift.maxGroupsPerSlot
                });
            }

            return slots;
        }

        function buildSlotGroups(dateString) {
            const availability = getAvailability(dateString);

            if (!availability.available) {
                return {
                    availability,
                    groups: []
                };
            }

            const groups = availability.shifts.map(shift => ({
                shift,
                slots: buildSlotsForShift(dateString, shift)
            }));

            return {
                availability,
                groups
            };
        }

        function updateMainTimeSlots() {
            selectedTime = "";
            document.getElementById("reserve-time").value = "";

            const dateString = document.getElementById("reserve-date").value;
            renderTimeSlotGroups({
                dateString,
                containerId: "time-slot-list",
                infoId: "reserve-date-info",
                selectedValue: selectedTime,
                onClickFunction: "selectMainTime"
            });
        }

        function updateChangeTimeSlots() {
            selectedChangeTime = "";
            document.getElementById("change-reserve-time").value = "";

            const dateString = document.getElementById("change-reserve-date").value;
            renderTimeSlotGroups({
                dateString,
                containerId: "change-time-slot-list",
                infoId: "change-date-info",
                selectedValue: selectedChangeTime,
                onClickFunction: "selectChangeTime"
            });
        }

        function renderTimeSlotGroups({ dateString, containerId, infoId, selectedValue, onClickFunction }) {
            const container = document.getElementById(containerId);
            const info = document.getElementById(infoId);

            if (!dateString) {
                container.innerHTML = `<p class="text-xs text-slate-400">日付を選択してください。</p>`;
                info.innerText = "";
                return;
            }

            const { availability, groups } = buildSlotGroups(dateString);

            info.innerText = availability.reason || "";

            if (!availability.available) {
                container.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-sm font-bold">
                        ${escapeHtml(availability.reason)}
                    </div>
                `;
                return;
            }

            const totalSlots = groups.reduce((sum, group) => sum + group.slots.length, 0);

            if (!totalSlots) {
                container.innerHTML = `
                    <div class="bg-slate-50 border border-slate-200 text-slate-500 rounded-xl p-4 text-sm font-bold">
                        この日に選択できる時間はありません。
                    </div>
                `;
                return;
            }

            container.innerHTML = groups.map(group => {
                if (!group.slots.length) {
                    return "";
                }

                const capacityText = [
                    group.shift.maxGuestsPerSlot !== null && group.shift.maxGuestsPerSlot !== undefined
                        ? `最大${group.shift.maxGuestsPerSlot}名`
                        : null,
                    group.shift.maxGroupsPerSlot !== null && group.shift.maxGroupsPerSlot !== undefined
                        ? `最大${group.shift.maxGroupsPerSlot}組`
                        : null
                ].filter(Boolean).join(" / ");

                return `
                    <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3">
                        <div class="flex justify-between items-center mb-2">
                            <p class="text-xs font-black text-slate-700">
                                ${escapeHtml(group.shift.shiftLabel)}
                            </p>
                            <p class="text-[10px] text-slate-400">
                                ${formatTime(group.shift.openTime)}〜${formatTime(group.shift.closeTime)}
                                ${capacityText ? ` / ${capacityText}` : ""}
                            </p>
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            ${group.slots.map(slot => `
                                <button
                                    type="button"
                                    data-time="${slot.time}"
                                    onclick="${onClickFunction}('${slot.time}')"
                                    class="time-button-${containerId} border border-slate-300 bg-white hover:bg-slate-900 hover:text-white rounded-xl py-3 text-sm font-bold transition active:scale-95 ${selectedValue === slot.time ? "time-active" : ""}"
                                >
                                    ${slot.time}
                                </button>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");
        }

        function selectMainTime(time) {
            selectedTime = time;
            document.getElementById("reserve-time").value = time;

            document.querySelectorAll(".time-button-time-slot-list").forEach(button => {
                button.classList.toggle("time-active", button.dataset.time === time);
            });
        }

        function selectChangeTime(time) {
            selectedChangeTime = time;
            document.getElementById("change-reserve-time").value = time;

            document.querySelectorAll(".time-button-change-time-slot-list").forEach(button => {
                button.classList.toggle("time-active", button.dataset.time === time);
            });
        }

        function getSelectedPreferences() {
            return Array.from(document.querySelectorAll(".pref-checkbox:checked")).map(input => input.value);
        }

        async function createReservation() {
            const button = document.getElementById("btn-create-reservation");

            try {
                const idToken = ensureLineReady();

                const reserveDate = document.getElementById("reserve-date").value;
                const reserveTime = document.getElementById("reserve-time").value;
                const partySize = document.getElementById("party-size").value;
                const seatType = document.getElementById("seat-type").value;
                const customerNote = document.getElementById("customer-note").value.trim();

                if (!reserveDate) {
                    alert("予約日を選択してください。");
                    return;
                }

                if (!reserveTime) {
                    alert("予約時間を選択してください。");
                    return;
                }

                if (!confirm(`${reserveDate} ${reserveTime} / ${partySize}名で予約リクエストを送りますか？`)) {
                    return;
                }

                button.disabled = true;
                button.innerText = "送信中...";

                const data = await apiFetch("/api/reservations/create", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        idToken,
                        reserveDate,
                        reserveTime,
                        partySize,
                        seatType,
                        preferences: getSelectedPreferences(),
                        customerNote
                    })
                });

                const message = data.result?.message || "予約リクエストを送信しました。";
                showToast(message);

                document.getElementById("customer-note").value = "";
                document.querySelectorAll(".pref-checkbox").forEach(input => input.checked = false);

                await fetchMyReservations();

            } catch (err) {
                console.error("予約作成エラー:", err);
                alert("予約できませんでした。\n" + err.message);

            } finally {
                button.disabled = false;
                button.innerText = "予約リクエストを送る";
            }
        }

        async function fetchMyReservations() {
            const list = document.getElementById("my-reservation-list");

            if (!lineIdToken) {
                list.innerHTML = `
                    <div class="text-center text-slate-400 text-sm py-6 bg-slate-50 rounded-xl">
                        LINEログイン後に予約が表示されます。
                    </div>
                `;
                return;
            }

            list.innerHTML = `<p class="text-center text-slate-400 text-sm py-6 animate-pulse">読み込み中...</p>`;

            try {
                const data = await apiFetch("/api/reservations/my", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${lineIdToken}`
                    }
                });

                myReservations = data.reservations || [];
                renderMyReservations();

            } catch (err) {
                console.error("自分の予約取得エラー:", err);
                list.innerHTML = `
                    <div class="text-center text-red-500 text-sm py-6 bg-red-50 rounded-xl border border-red-100">
                        予約を取得できませんでした。<br>${escapeHtml(err.message)}
                    </div>
                `;
            }
        }

        function renderMyReservations() {
            const list = document.getElementById("my-reservation-list");

            if (!myReservations.length) {
                list.innerHTML = `
                    <div class="text-center text-slate-400 text-sm py-6 bg-slate-50 rounded-xl">
                        現在、有効な予約はありません。
                    </div>
                `;
                return;
            }

            list.innerHTML = myReservations.map(res => {
                const statusLabel = STATUS_LABELS[res.status] || res.status;
                const seatLabel = SEAT_LABELS[res.seat_type] || res.seat_type || "指定なし";

                return `
                    <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
                        <div class="flex justify-between items-start gap-3">
                            <div>
                                <div class="flex items-center gap-2 flex-wrap">
                                    <p class="font-black text-slate-800">
                                        ${escapeHtml(res.reserve_date)} ${formatTime(res.reserve_time)}
                                    </p>
                                    <span class="${reservationStatusClass(res.status)} text-[10px] px-2 py-1 rounded-full font-bold border">
                                        ${statusLabel}
                                    </span>
                                </div>

                                <p class="text-xs text-slate-500 mt-2">
                                    👤 ${res.party_size}名 / 🪑 ${seatLabel}
                                </p>

                                ${res.customer_note ? `<p class="text-xs text-slate-400 mt-1">要望: ${escapeHtml(res.customer_note)}</p>` : ""}
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 mt-3">
                            <button onclick="openChangeModal('${escapeJs(res.id)}')" class="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 font-bold py-2 rounded-xl text-xs active:scale-95 transition">
                                予約変更
                            </button>

                            <button onclick="cancelReservation('${escapeJs(res.id)}')" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold py-2 rounded-xl text-xs active:scale-95 transition">
                                キャンセル
                            </button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function reservationStatusClass(status) {
            if (status === "confirmed") {
                return "bg-emerald-100 text-emerald-700 border-emerald-200";
            }

            if (status === "pending") {
                return "bg-amber-100 text-amber-700 border-amber-200";
            }

            return "bg-slate-100 text-slate-500 border-slate-200";
        }

        async function cancelReservation(reservationId) {
            const reason = prompt("キャンセル理由を入力してください。", "顧客都合");

            if (reason === null) {
                return;
            }

            if (!confirm("この予約をキャンセルしますか？")) {
                return;
            }

            try {
                const idToken = ensureLineReady();

                const data = await apiFetch("/api/reservations/cancel", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        idToken,
                        reservationId,
                        reason
                    })
                });

                showToast(data.result?.message || "予約をキャンセルしました。");
                await fetchMyReservations();

            } catch (err) {
                console.error("予約キャンセルエラー:", err);
                alert("キャンセルできませんでした。\n" + err.message);
            }
        }

        function openChangeModal(reservationId) {
            const reservation = myReservations.find(res => res.id === reservationId);

            if (!reservation) {
                alert("予約が見つかりません。");
                return;
            }

            document.getElementById("change-old-reservation-id").value = reservation.id;
            document.getElementById("change-reserve-date").value = reservation.reserve_date;
            document.getElementById("change-party-size").value = String(reservation.party_size || 2);
            document.getElementById("change-seat-type").value = reservation.seat_type || "any";
            document.getElementById("change-reason").value = "予約内容の変更";

            document.getElementById("change-modal").classList.remove("hidden");

            updateChangeTimeSlots();

            if (reservation.reserve_time) {
                setTimeout(() => {
                    const originalTime = formatTime(reservation.reserve_time);
                    const button = Array.from(document.querySelectorAll(".time-button-change-time-slot-list")).find(btn => btn.dataset.time === originalTime);

                    if (button) {
                        selectChangeTime(originalTime);
                    }
                }, 0);
            }
        }

        function closeChangeModal() {
            document.getElementById("change-modal").classList.add("hidden");
        }

        async function submitChangeReservation() {
            const button = document.getElementById("btn-submit-change");

            try {
                const idToken = ensureLineReady();

                const oldReservationId = document.getElementById("change-old-reservation-id").value;
                const reserveDate = document.getElementById("change-reserve-date").value;
                const reserveTime = document.getElementById("change-reserve-time").value;
                const partySize = document.getElementById("change-party-size").value;
                const seatType = document.getElementById("change-seat-type").value;
                const reason = document.getElementById("change-reason").value.trim();

                if (!oldReservationId) {
                    alert("変更対象の予約がありません。");
                    return;
                }

                if (!reserveDate) {
                    alert("変更後の日付を選択してください。");
                    return;
                }

                if (!reserveTime) {
                    alert("変更後の時間を選択してください。");
                    return;
                }

                if (!confirm(`${reserveDate} ${reserveTime} / ${partySize}名に変更しますか？`)) {
                    return;
                }

                button.disabled = true;
                button.innerText = "変更中...";

                const data = await apiFetch("/api/reservations/change", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        idToken,
                        oldReservationId,
                        reserveDate,
                        reserveTime,
                        partySize,
                        seatType,
                        preferences: [],
                        reason
                    })
                });

                showToast(data.result?.message || "予約変更リクエストを送信しました。");
                closeChangeModal();
                await fetchMyReservations();

            } catch (err) {
                console.error("予約変更エラー:", err);
                alert("予約変更できませんでした。\n" + err.message);

            } finally {
                button.disabled = false;
                button.innerText = "この内容で予約変更する";
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.remove("hidden");

            setTimeout(() => {
                toast.classList.add("hidden");
            }, 2400);
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeJs(value) {
            return String(value ?? "")
                .replaceAll("\\", "\\\\")
                .replaceAll("'", "\\'")
                .replaceAll("\n", "\\n")
                .replaceAll("\r", "");
        }
    </script>
</body>
</html>
