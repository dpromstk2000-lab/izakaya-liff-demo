<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居酒屋 予約システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-amber-50 text-neutral-800 min-h-screen flex flex-col justify-between">

    <header class="bg-amber-800 text-white text-center py-4 shadow-md">
        <h1 class="text-xl font-bold tracking-wider">🏮 炭火焼 居酒屋デモ 🏮</h1>
        <p class="text-xs text-amber-200 mt-1">LINE限定・カンタン予約システム</p>
    </header>

    <main class="p-4 max-w-md mx-auto w-full flex-grow">
        <div id="loading" class="text-center py-12">
            <p class="text-amber-800 animate-pulse font-medium">LINEログイン認証中...</p>
        </div>

        <div id="app" class="hidden bg-white p-6 rounded-2xl shadow-xl border border-amber-100">
            <div class="mb-6 border-b border-amber-100 pb-3 flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center text-lg">👤</div>
                <div>
                    <p class="text-xs text-neutral-400">いらっしゃいませ！</p>
                    <p id="user-name" class="font-bold text-neutral-700">ゲスト 様</p>
                </div>
            </div>

            <form id="reserve-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-neutral-500 mb-2 uppercase tracking-wider">予約の種類</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="border-2 border-amber-600 rounded-xl p-3 text-center cursor-pointer block bg-amber-50 text-amber-900 font-bold transition-all" id="label-normal">
                            <input type="radio" name="reserve_type" value="通常予約" checked class="hidden" onchange="toggleType('normal')">
                            📅 通常予約
                        </label>
                        <label class="border-2 border-neutral-200 rounded-xl p-3 text-center cursor-pointer block text-neutral-500 font-bold transition-all" id="label-tonight">
                            <input type="radio" name="reserve_type" value="今夜の空席" id="input-tonight" class="hidden" onchange="toggleType('tonight')">
                            <span id="text-tonight">⚡ 今夜の空席</span>
                        </label>
                    </div>
                    <p id="tonight-notice" class="hidden text-xs text-red-600 font-bold mt-2 bg-red-50 p-2 rounded-lg border border-red-100">
                        ⚠️ 今夜は満席のためリアルタイム予約を停止しています。空き次第通知を希望される場合は、店舗スタッフまで公式LINEトークにてご連絡ください。
                    </p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-neutral-500 mb-1 uppercase tracking-wider">ご予約者名（ひらがな・漢字）</label>
                    <input type="text" id="customer-name" required placeholder="例：いわぐち だいじろう" class="w-full border border-neutral-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-amber-600 bg-neutral-50">
                </div>

                <div>
                    <label class="block text-xs font-bold text-neutral-500 mb-2 uppercase tracking-wider">お好み・ご希望（複数選択可）</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="inline-flex items-center gap-1.5 bg-neutral-50 hover:bg-amber-50 border border-neutral-200 rounded-xl px-3 py-2 text-xs font-medium cursor-pointer transition select-none">
                            <input type="checkbox" name="preferences" value="ビール派" class="w-4 h-4 rounded border-neutral-300 text-amber-700 focus:ring-amber-600">
                            🍺 ビール派
                        </label>
                        <label class="inline-flex items-center gap-1.5 bg-neutral-50 hover:bg-amber-50 border border-neutral-200 rounded-xl px-3 py-2 text-xs font-medium cursor-pointer transition select-none">
                            <input type="checkbox" name="preferences" value="レモンサワー派" class="w-4 h-4 rounded border-neutral-300 text-amber-700 focus:ring-amber-600">
                            🍋 サワー派
                        </label>
                        <label class="inline-flex items-center gap-1.5 bg-neutral-50 hover:bg-amber-50 border border-neutral-200 rounded-xl px-3 py-2 text-xs font-medium cursor-pointer transition select-none">
                            <input type="checkbox" name="preferences" value="禁煙席希望" class="w-4 h-4 rounded border-neutral-300 text-amber-700 focus:ring-amber-600">
                            🚭 禁煙席希望
                        </label>
                    </div>
                </div>

                <div id="date-group">
                    <label class="block text-xs font-bold text-neutral-500 mb-1 uppercase tracking-wider">ご来店日</label>
                    <input type="date" id="reserve-date" required class="w-full border border-neutral-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-amber-600 bg-neutral-50">
                </div>

                <div>
                    <label class="block text-xs font-bold text-neutral-500 mb-1 uppercase tracking-wider">ご来店時間</label>
                    <select id="reserve-time" required class="w-full border border-neutral-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-amber-600 bg-neutral-50">
                        <option value="17:00">17:00</option>
                        <option value="18:00">18:00</option>
                        <option value="19:00">19:00</option>
                        <option value="20:00">20:00</option>
                        <option value="21:00">21:00</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-neutral-500 mb-1 uppercase tracking-wider">ご利用人数</label>
                    <select id="party-size" required class="w-full border border-neutral-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-amber-600 bg-neutral-50">
                        <option value="1">1名</option>
                        <option value="2">2名</option>
                        <option value="3">3名</option>
                        <option value="4" selected>4名</option>
                        <option value="5">5名</option>
                        <option value="6">6名以上</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-amber-800/20 transition duration-200 mt-2 cursor-pointer text-center block">
                    この内容で予約を申請する
                </button>
            </form>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-neutral-400 bg-neutral-100 border-t border-neutral-200">
        &copy; DPRO SHOP Demo System
    </footer>

    <script>
        // 環境設定（鍵情報）
        const LIFF_ID = "2010334558-3WGZGeu2"; 
        const SUPABASE_URL = "https://cbknucemarcpbscirzyv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J";

        // Supabaseクライアントの初期化
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let userProfile = null;

        // 予約タイプの切り替え（通常予約 / 今夜の空席）
        function toggleType(type) {
            const labelNormal = document.getElementById('label-normal');
            const labelTonight = document.getElementById('label-tonight');
            const dateGroup = document.getElementById('date-group');
            const dateInput = document.getElementById('reserve-date');
            const inputTonight = document.getElementById('input-tonight');

            // 満席時は「今夜の空席」への切り替えをブロック
            if (type === 'tonight' && inputTonight.disabled) return;

            if (type === 'tonight') {
                labelTonight.className = "border-2 border-amber-600 rounded-xl p-3 text-center cursor-pointer block bg-amber-50 text-amber-900 font-bold transition-all";
                labelNormal.className = "border-2 border-neutral-200 rounded-xl p-3 text-center cursor-pointer block text-neutral-500 font-bold transition-all";
                dateGroup.style.display = 'none';
                
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
            } else {
                labelNormal.className = "border-2 border-amber-600 rounded-xl p-3 text-center cursor-pointer block bg-amber-50 text-amber-900 font-bold transition-all";
                labelTonight.className = "border-2 border-neutral-200 rounded-xl p-3 text-center cursor-pointer block text-neutral-500 font-bold transition-all";
                dateGroup.style.display = 'block';
                dateInput.value = "";
            }
        }

        // 💡【機能①のコア】Supabase Realtime と連携した空席状況反映ロジック
        async function listenShopStatus() {
            // 1. 初回読み込み時の状態取得
            const { data, error } = await db
                .from('shop_status')
                .select('status')
                .single(); // 単一店舗レコードを想定

            if (!error && data) {
                applyShopStatusUI(data.status);
            }

            // 2. Realtime で店舗側の変更をリアルタイム検知
            db.channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'shop_status' },
                    (payload) => {
                        if (payload.new && payload.new.status) {
                            applyShopStatusUI(payload.new.status);
                        }
                    }
                )
                .subscribe();
        }

        // 空席状態に応じたUI制御
        function applyShopStatusUI(status) {
            const labelTonight = document.getElementById('label-tonight');
            const inputTonight = document.getElementById('input-tonight');
            const textTonight = document.getElementById('text-tonight');
            const tonightNotice = document.getElementById('tonight-notice');

            if (status === '満席') {
                inputTonight.disabled = true;
                tonightNotice.classList.remove('hidden');
                
                // もし現在「今夜の空席」が選ばれていたら通常予約に強制避難
                if (inputTonight.checked) {
                    document.querySelector('input[name="reserve_type"][value="通常予約"]').checked = true;
                    toggleType('normal');
                }

                // グレーアウト表現の適用
                labelTonight.className = "border-2 border-neutral-200 bg-neutral-100 rounded-xl p-3 text-center block text-neutral-400 font-bold opacity-50 cursor-not-allowed transition-all";
                textTonight.innerText = "❌ 今夜は満席";
            } else {
                inputTonight.disabled = false;
                tonightNotice.classList.add('hidden');
                
                // 状態に応じたテキスト装飾
                const suffix = status === '残りわずか' ? ' (残りわずか!🔺)' : '';
                textTonight.innerText = `⚡ 今夜の空席${suffix}`;

                // ラジオボタンの選択状態に合わせて現在のスタイルを再計算
                const currentType = document.querySelector('input[name="reserve_type"]:checked').value;
                if (currentType === '今夜の空席') {
                    labelTonight.className = "border-2 border-amber-600 rounded-xl p-3 text-center cursor-pointer block bg-amber-50 text-amber-900 font-bold transition-all";
                } else {
                    labelTonight.className = "border-2 border-neutral-200 rounded-xl p-3 text-center cursor-pointer block text-neutral-500 font-bold transition-all";
                }
            }
        }

        // ページ読み込み時のLIFF初期化
        window.addEventListener('DOMContentLoaded', async () => {
            // 通常予約は明日以降のみ選択可能にする制御
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('reserve-date').min = tomorrow.toISOString().split('T')[0];

            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    userProfile = await liff.getProfile();
                    document.getElementById('user-name').innerText = `${userProfile.displayName} 様`;
                    document.getElementById('customer-name').value = userProfile.displayName;
                    
                    // リアルタイム空席同期の監視開始
                    await listenShopStatus();
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                }
            } catch (error) {
                alert("システムの初期化に失敗しました: " + error);
            }
        });

        // フォーム送信処理
        document.getElementById('reserve-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const reserveType = document.querySelector('input[name="reserve_type"]:checked').value;
            const customerName = document.getElementById('customer-name').value;
            const reserveDate = document.getElementById('reserve-date').value;
            const reserveTime = document.getElementById('reserve-time').value;
            const partySize = parseInt(document.getElementById('party-size').value);

            // 💡【機能②のコア】チェックされた顧客属性（お好み）を配列で抽出
            const checkedPrefs = Array.from(document.querySelectorAll('input[name="preferences"]:checked'))
                                      .map(el => el.value);

            // 保存データ構造
            const reservationData = {
                line_user_id: userProfile.userId,
                line_name: customerName,
                reserve_type: reserveType,
                reserve_date: reserveDate,
                reserve_time: reserveTime,
                party_size: partySize,
                preferences: checkedPrefs,   // 💡 jsonb型カラムへシリアライズして格納
                status: "仮予約"             // 💡【機能③】初期ステータスを承認制（仮予約）に設定
            };

            try {
                // 1. Supabaseの「izakaya_reservations」テーブルへデータ保存
                const { error } = await db
                    .from('izakaya_reservations')
                    .insert([reservationData]);

                if (error) throw error;

                // 2. LINEトーク画面へ自動控えを投稿（Messaging APIの無料枠を消費しない仕組み）
                if (liff.isInClient()) {
                    await liff.sendMessages([
                        {
                            type: 'text',
                            text: `🤖 予約申請を承りました\n\n${customerName} 様、以下の内容で仮予約を受け付けました。店舗からの確定連絡をお待ちください。\n\n📅 種類：${reserveType}\n📅 日付：${reserveDate}\n⏰ 時間：${reserveTime}〜\n👤 人数：${partySize}名\n\n※まだ予約は確定しておりません。`
                        }
                    ]);
                }

                alert('予約の申請が完了しました！店舗からの確定通知をお待ちください。');
                liff.closeWindow();

            } catch (err) {
                alert('エラーが発生しました: ' + err.message);
            }
        });
    </script>
</body>
</html>
